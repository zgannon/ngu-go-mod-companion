name: Production Release Build

on:
  push:
    tags:
      - "v*" # Triggers the workflow only when you push tags matching v1.0, v0.1.0, etc.

jobs:
  release:
    name: Build & Publish Release Artifact
    runs-on: ubuntu-latest

    # Grants permission to the workflow token to write releases
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Development Dependencies
        run: npm ci

      - name: Run Build (Format, Lint, and Zip Archive Production)
        run: npm run build

      - name: Extract Changelog Notes
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release & Upload Production Zip
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          # Appends the auto-generated "Full Changelog" comparison link below the body
          generate_release_notes: true
          draft: false
          prerelease: false
          # Searches for and grabs the dynamically named zip output from your script
          files: |
            *.zip
